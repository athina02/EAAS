<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>EAAS - ATHINA Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== TOP HEADER ===== -->
  <header class="header fade-in">
    <div class="header-top">
      <h1 class="brand">ATHINA</h1>
      <div class="status-dot"></div>
    </div>

    <div class="greeting-block">
      <p id="greetingTime" class="greeting-time">Good Morning</p>
      <p id="greetingSub" class="greeting-sub">Welcome Back</p>
      <p class="mission-ready">Mission Ready.</p>
    </div>

    <p id="datetime" class="datetime">Loading...</p>
  </header>

  <!-- ===== MAIN SCROLL AREA ===== -->
  <main class="main-content">

    <!-- Recovery Card -->
    <section class="card recovery-card fade-in">
      <div class="card-header">
        <span class="card-title">Recovery</span>
        <span class="recovery-percent" id="recoveryPercent">--</span>
      </div>

      <div class="recovery-ring-wrap">
        <svg class="recovery-ring" viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
          <circle class="ring-fill" id="ringFill" cx="60" cy="60" r="52"></circle>
        </svg>
        <span class="ring-label" id="ringLabel">--</span>
      </div>

      <div class="recovery-stats">
        <div class="stat-item">
          <span class="stat-value" id="sleepValue">--</span>
          <span class="stat-label">Sleep</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="energyValue">--</span>
          <span class="stat-label">Energy</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="weightValue">--</span>
          <span class="stat-label">Weight</span>
        </div>
      </div>
    </section>

    <!-- Today's Mission -->
    <section class="card mission-card fade-in">
      <div class="card-header">
        <span class="card-title">Today's Mission</span>
        <span class="mission-tag" id="missionTag">--</span>
      </div>
      <p class="mission-text" id="missionText">No mission set yet.</p>
    </section>

    <!-- Start Workout Button -->
    <button class="start-btn fade-in" id="startWorkoutBtn">
      <span class="start-btn-text">START WORKOUT</span>
      <span class="start-btn-glow"></span>
    </button>

    <!-- Quick Stats -->
    <section class="quick-stats fade-in">
      <div class="quick-stat-box">
        <span class="quick-stat-value" id="totalWorkouts">--</span>
        <span class="quick-stat-label">Total Workouts</span>
      </div>
      <div class="quick-stat-box">
        <span class="quick-stat-value" id="currentStreak">--</span>
        <span class="quick-stat-label">Day Streak</span>
      </div>
      <div class="quick-stat-box">
        <span class="quick-stat-value" id="personalRecords">--</span>
        <span class="quick-stat-label">Records</span>
      </div>
    </section>

  </main>

  <!-- ===== BOTTOM NAVIGATION ===== -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-nav="home">
      <span class="nav-icon">⌂</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" data-nav="workout">
      <span class="nav-icon">⚡</span>
      <span class="nav-label">Workout</span>
    </button>
    <button class="nav-item" data-nav="progress">
      <span class="nav-icon">▲</span>
      <span class="nav-label">Progress</span>
    </button>
    <button class="nav-item" data-nav="athina">
      <span class="nav-icon">◉</span>
      <span class="nav-label">ATHINA</span>
    </button>
    <button class="nav-item" data-nav="settings">
      <span class="nav-icon">⚙</span>
      <span class="nav-label">Settings</span>
    </button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
